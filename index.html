<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jantar de Noivado - Marcos & Karyna</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #f7f3f0; color: #333; text-align: center; padding: 20px; margin: 0; }
    .card { background: white; border-radius: 20px; max-width: 420px; margin: 40px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden; }
    .banner-img { width: 100%; height: 180px; background-image: url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600&auto=format&fit=crop'); background-size: cover; background-position: center; }
    
    .card-content { padding: 30px; }
    
    /* FOTO QUADRADA QUE PREENCHE O CÍRCULO */
    .couple-photo-container {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin: -90px auto 20px;
      background-image: url('foto.jpg'); 
      background-size: cover; 
      background-position: center;
      background-color: #fff;
    }

    h1 { color: #b08d57; font-size: 1.8em; margin: 10px 0 5px; }
    h2 { font-weight: 400; font-size: 1.2em; margin-bottom: 20px; color: #666; }
    
    p { font-size: 0.95em; color: #555; margin-bottom: 25px; line-height: 1.5; }

    .detalhes { text-align: left; max-width: 280px; margin: 0 auto 30px; }
    .detalhe-item { display: flex; align-items: center; margin-bottom: 15px; }
    .detalhe-item i { color: #e1b894; font-size: 1.3em; margin-right: 15px; width: 25px; text-align: center; }
    
    .btn-container { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    button { border-radius: 10px; padding: 12px 20px; font-size: 1em; cursor: pointer; transition: 0.3s; width: 100%; max-width: 280px; border: none; font-family: 'Montserrat'; font-weight: bold; }
    .btn-mapa { color: #b08d57; border: 2px solid #e1b894; background: white; }
    .btn-rsvp { background-color: #e1b894; color: white; }
    
    #music-info { margin-top: 20px; font-size: 10px; color: #b08d57; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body onclick="iniciarMusica()" onscroll="iniciarMusica()" ontouchstart="iniciarMusica()">

<div class="card">
  <div class="banner-img"></div>
  <div class="card-content">
    
    <div class="couple-photo-container"></div>

    <h1>Jantar de Noivado</h1>
    <h2>Marcos & Karyna</h2>

    <p>Convidamos você para celebrar este momento tão especial conosco!</p>

    <div class="detalhes">
      <div class="detalhe-item"><i class="fas fa-calendar-alt"></i><span>Sábado, 28/03/2026</span></div>
      <div class="detalhe-item"><i class="fas fa-clock"></i><span>A partir das 20:00h</span></div>
      <div class="detalhe-item"><i class="fas fa-map-marker-alt"></i><span>Casa da Vovó Diná</span></div>
    </div>

    <div class="btn-container">
      <button class="btn-mapa" onclick="window.open('https://www.google.com/maps/search/?api=1&query=$0', '_blank')">
        <i class="fas fa-location-arrow"></i> Ver no Mapa
      </button>
      <button class="btn-rsvp" onclick="confirmar()">
        <i class="fab fa-whatsapp"></i> Confirmar Presença
      </button>
    </div>

    <div id="music-info">🎵 Clique para tocar: Iris - Goo Goo Dolls</div>
    <audio id="meuAudio" loop preload="auto">
      <source src="iris.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

<script>
  // SISTEMA DE MÚSICA REFORÇADO
  let tocando = false;
  function iniciarMusica() {
    const audio = document.getElementById('meuAudio');
    if (!tocando) {
      audio.play().then(() => {
        tocando = true;
        document.getElementById('music-info').innerText = "🎵 Tocando: Iris";
      }).catch(e => console.log("Aguardando interação do usuário..."));
    }
  }

  function confirmar() {
    const msg = encodeURIComponent("Olá! Confirmo minha presença no jantar de noivado de Marcos & Karyna! 💍🎉");
    window.location.href = `https://wa.me/5562993472158?text=${msg}`;
  }
</script>

</body>
</html>
