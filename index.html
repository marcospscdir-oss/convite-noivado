<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jantar de Noivado - Marcos & Karyna</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #f7f3f0; color: #333; text-align: center; padding: 20px; margin: 0; }
    .card { background: white; border-radius: 20px; max-width: 450px; margin: 40px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden; }
    .banner-img { width: 100%; height: 200px; object-fit: cover; }
    .card-content { padding: 30px; }
    
    /* AQUI ESTÁ O SEGREDO DA FOTO: */
    .couple-img { 
      width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: -90px; object-fit: cover;
      background-color: #eee; /* Fundo cinza caso a foto falhe */
    }

    h1 { color: #b08d57; font-size: 1.8em; margin: 15px 0 5px; }
    h2 { font-weight: 400; font-size: 1.1em; margin-bottom: 25px; color: #666; }
    .detalhes { text-align: left; max-width: 280px; margin: 0 auto 30px; }
    .detalhe-item { display: flex; align-items: center; margin-bottom: 15px; font-size: 0.95em; }
    .detalhe-item i { color: #e1b894; font-size: 1.3em; margin-right: 15px; width: 25px; text-align: center; }
    .btn-container { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    button { border-radius: 10px; padding: 12px 20px; font-size: 1em; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: 0.3s; width: 100%; max-width: 280px; border: none; }
    .btn-mapa { color: #b08d57; border: 2px solid #e1b894; background: white; }
    .btn-rsvp { background-color: #e1b894; color: white; font-weight: 700; }
    button:hover { opacity: 0.8; transform: translateY(-2px); }
  </style>
</head>
<body>

<div class="card">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600&auto=format&fit=crop" class="banner-img">
  <div class="card-content">
    
    <img src="foto.jpg" alt="Marcos e Karyna" class="couple-img">

    <h1>Jantar de Noivado</h1>
    <h2>Marcos & Karyna</h2>
    <p style="font-size: 0.9em; line-height: 1.5;">Convidamos você para celebrar este momento tão especial!</p>

    <div class="detalhes">
      <div class="detalhe-item"><i class="fas fa-calendar-alt"></i><span>Sábado, 28/03/2026</span></div>
      <div class="detalhe-item"><i class="fas fa-clock"></i><span>A partir das 20:00h</span></div>
      <div class="detalhe-item"><i class="fas fa-map-marker-alt"></i><span>Casa da Vovó Diná</span></div>
    </div>

    <div class="btn-container">
      <button class="btn-mapa" onclick="window.open('http://googleusercontent.com/maps.google.com/5', '_blank')">
        <i class="fas fa-location-arrow"></i> Ver no Mapa
      </button>
      <button class="btn-rsvp" onclick="confirmar()">
        <i class="fab fa-whatsapp"></i> Confirmar Presença
      </button>
    </div>
  </div>
</div>

<script>
  function confirmar() {
    const msg = encodeURIComponent("Olá! Confirmo minha presença no jantar de noivado de Marcos & Karyna! 💍");
    window.location.href = `https://wa.me/5599999999999?text=${msg}`; // Troque pelo seu número!
  }
</script>

</body>
</html>
